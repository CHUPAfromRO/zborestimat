<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Calculator timp de zbor</title>

<link rel="stylesheet" href="style.css">

<link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

</head>

<body>

<h1>Calculator estimă de zbor</h1>

<div class="panel">

<div class="row">

<div>
<label>Plecare</label>
<select id="departure">
<option>Târgu Mureș</option>
<option>Jibou</option>
<option>Caransebeș</option>
<option>Arad</option>
<option>Brașov</option>
</select>
</div>

<div class="resultbox">
<label>Timp zbor</label>
<p><span id="time">-</span> min</p>
</div>

</div>

<div class="destination-row">

<label>Destinație</label>
<input id="destination" placeholder="Ex: București">

</div>

<button onclick="calculate()">Calculează</button>

<p>Distanță: <span id="distance">-</span> NM</p>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
